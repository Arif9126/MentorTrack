<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Student</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#1B5E20,#43A047);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:600px;
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
text-align:center;
color:#1B5E20;
margin-bottom:25px;
}

label{
font-weight:bold;
color:#1B5E20;
}

input{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:18px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#FBC02D;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
color:#1B5E20;
}

button:hover{
background:#FFD54F;
}

.back{
display:block;
text-align:center;
margin-top:15px;
text-decoration:none;
font-weight:bold;
color:#1B5E20;
}

</style>
</head>

<body>

<div class="container">

<h1>➕ Add Student</h1>

{% if error %}
<p style="
color:red;
font-weight:bold;
text-align:center;
margin-bottom:15px;">
{{ error }}
</p>
{% endif %}

<form method="POST">

<label>USN</label>
<input type="text"
name="usn"
maxlength="10"
required>

<label>CGPA</label>
<input type="number" step="0.01" name="cgpa" required>

<label>Backlogs</label>
<input type="number" name="backlogs" required>

<label>Attendance (%)</label>
<input type="number" name="attendance" required>

<button type="submit">
Save Student
</button>

</form>

<a href="/" class="back">⬅ Back to Dashboard</a>

</div>

</body>
</html>
