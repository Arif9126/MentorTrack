<!DOCTYPE html>

<html>
<head>
<title>View Students</title>

<style>

body{
background:linear-gradient(135deg,#1B5E20,#43A047);
font-family:Arial,sans-serif;
padding:30px;
}

.container{
background:white;
padding:25px;
border-radius:20px;
max-width:1100px;
margin:auto;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

h1{
text-align:center;
color:#1B5E20;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#1B5E20;
color:white;
padding:12px;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid #ddd;
}

tr:hover{
background:#f5f5f5;
}

.back-btn{
display:inline-block;
margin-top:20px;
padding:10px 20px;
background:#FBC02D;
color:#1B5E20;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.delete-btn{
background:red;
color:white;
padding:8px 15px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

.delete-btn:hover{
background:darkred;
}

.edit-btn{
background:#2196F3;
color:white;
padding:8px 15px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

.edit-btn:hover{
background:#1976D2;
}

.delete-btn{
background:#E53935;
color:white;
padding:8px 15px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

.delete-btn:hover{
background:#C62828;
}

</style>

</head>

<body>

<div class="container">

<h1>📋 All Student Records</h1>

<table>

<tr>
<th>USN</th>
<th>CGPA</th>
<th>Backlogs</th>
<th>Attendance</th>
<th>Edit</th>
<th>Delete</th>
</tr>

{% for student in students %}

<tr>
<td>{{ student.usn }}</td>
<td>{{ student.cgpa }}</td>
<td>{{ student.backlogs }}</td>
<td>{{ student.attendance }}%</td>

<td>
<a class="edit-btn"
href="/edit/{{ student.usn }}">
Edit
</a>
</td>

<td>
<a class="delete-btn"
href="/delete/{{ student.usn }}"
onclick="return confirm('Delete this student?')">
Delete
</a>
</td>

</tr>

{% endfor %}

</table>

<a href="/" class="back-btn">⬅ Dashboard</a>

</div>


</body>
</html>
