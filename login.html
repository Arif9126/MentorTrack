<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Mentoring Book - Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#1B5E20,#43A047);
        }

        .login-box{
            width:400px;
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0px 5px 20px rgba(0,0,0,0.3);
        }

        h1{
            text-align:center;
            color:#1B5E20;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:gray;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
        }

        button{
            width:100%;
            padding:12px;
            background:#FBC02D;
            color:#1B5E20;
            border:none;
            border-radius:8px;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            background:#FFD54F;
        }

        .footer{
            margin-top:20px;
            text-align:center;
            color:#666;
            font-size:13px;
        }

    </style>

</head>
<body>

<div class="login-box">

    <h1>🔐 Admin Login</h1>

    <p class="subtitle">
        Digital Mentoring Book Management System
    </p>

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Enter Username"
            required>

        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required>

        <button type="submit">
            Login
        </button>

    </form>

<div class="footer">
VVCE Administartion
</div>

</div>

</body>
</html>
